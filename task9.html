<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Sign In</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    width:380px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    color:#fff;
    animation:fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

.container h2{
    text-align:center;
    margin-bottom:30px;
    font-weight:600;
}

.input-group{
    position:relative;
    margin-bottom:25px;
}

.input-group input{
    width:100%;
    padding:12px 10px;
    background:transparent;
    border:none;
    border-bottom:2px solid #fff;
    outline:none;
    color:#fff;
    font-size:14px;
}

.input-group label{
    position:absolute;
    top:12px;
    left:10px;
    font-size:14px;
    color:#ddd;
    pointer-events:none;
    transition:0.3s;
}

.input-group input:focus ~ label,
.input-group input:valid ~ label{
    top:-10px;
    font-size:12px;
    color:#00f2fe;
}

.password-toggle{
    position:absolute;
    right:10px;
    top:12px;
    cursor:pointer;
    font-size:12px;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:20px;
}

.options a{
    color:#fff;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#00f2fe,#4facfe);
    color:#fff;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.social-login{
    margin-top:20px;
    text-align:center;
}

.social-login p{
    margin-bottom:10px;
    font-size:13px;
}

.social-icons{
    display:flex;
    justify-content:center;
    gap:15px;
}

.social-icons button{
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.google{background:#db4437;}
.facebook{background:#4267B2;}
.twitter{background:#1DA1F2;}

.register{
    margin-top:20px;
    text-align:center;
    font-size:13px;
}

.register a{
    color:#00f2fe;
    text-decoration:none;
}

.register a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">
    <h2>Sign In</h2>

    <form>
        <div class="input-group">
            <input type="email" required>
            <label>Email Address</label>
        </div>

        <div class="input-group">
            <input type="password" id="password" required>
            <label>Password</label>
            <span class="password-toggle" onclick="togglePassword()">Show</span>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="social-login">
        <p>Or login with</p>
        <div class="social-icons">
            <button class="google">G</button>
            <button class="facebook">F</button>
            <button class="twitter">T</button>
        </div>
    </div>

    <div class="register">
        Don’t have an account? <a href="#">Register</a>
    </div>
</div>

<script>
function togglePassword(){
    const password = document.getElementById("password");
    if(password.type === "password"){
        password.type = "text";
    } else {
        password.type = "password";
    }
}
</script>

</body>
</html>
